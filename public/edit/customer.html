<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmeni Korisnika</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-black text-light">
    <div class="container">

        <nav class="navbar navbar-expand-lg mb-3">
            <div class="container-fluid">
                <a class="navbar-brand" href="/index.html">
                    <i class="fa-solid fa-gamepad"></i> World of Games
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/index.html">
                                <i class="fa-solid fa-house"></i> Početna
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/customer.html">
                                <i class="fa-solid fa-user"></i> Korisnici
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/library.html">
                                <i class="fa-solid fa-book"></i> Biblioteka
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
            <div class="mb-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item">
                        <a href="/index.html">Home</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a href="/customer.html">Mušterije</a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page">
                        Izmeni
                    </li>
                </ol>
            </nav>
        <h3>Izmeni Korisnika</h3>

        <form id="edit">
            <div class="mb-3">
                <label class="form-label">ID:</label>
                <input type="number" id="id" class="form-control" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">Ime:</label>
                <input type="text" id="first" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Prezime:</label>
                <input type="text" id="last" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Telefon:</label>
                <input type="text" id="phone" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input type="email" id="email" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">JMBG:</label>
                <input type="text" id="umcn" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">PIB:</label>
                <input type="text" id="tax" class="form-control">
            </div>

            <button type="submit" class="btn btn-success">
                <i class="fa-solid fa-floppy-disk"></i> Sačuvaj
            </button>
        </form>

    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
const params = new URLSearchParams(location.search)
const id = params.get('id')

if (!id || id == '') {
    window.location.href = '/customer.html'
} else {

    axios.get('/api/customer/' + id).then(rsp => {

        const idInput = document.getElementById('id')
        idInput.value = rsp.data.id
        
        const first = document.getElementById('first')
        first.value = rsp.data.firstName

        const last = document.getElementById('last')
        last.value = rsp.data.lastName

        const phone = document.getElementById('phone')
        phone.value = rsp.data.phone

        const email = document.getElementById('email')
        email.value = rsp.data.email

        const umcn = document.getElementById('umcn')
        umcn.value = rsp.data.umcn

        const tax = document.getElementById('tax')
        tax.value = rsp.data.taxId ?? ''

        document.getElementById('edit').addEventListener('submit', (e) => {
            e.preventDefault()

            axios.request({
                url: `/api/customer/${rsp.data.id}`,
                method: 'put',
                data: {
                    firstName: first.value,
                    lastName: last.value,
                    phone: phone.value,
                    email: email.value,
                    umcn: umcn.value,
                    taxId: tax.value == '' ? null : tax.value
                }
            }).then(() => {
                window.location.href = '/customer.html'
            })
        })

    })
}
</script>

</body>
</html>
