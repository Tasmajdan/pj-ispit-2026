<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-black text-light">
    <div class="container">
        <nav class="navbar navbar-expand-lg mb-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="./index.html">
            <i class="fa-solid fa-gamepad"></i> World of Games
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/index.html">
                        <i class="fa-solid fa-house"></i> Početna
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/customer.html">
                        <i class="fa-solid fa-user"></i> Korisnici
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/library.html">
                        <i class="fa-solid fa-book"></i> Biblioteka
                    </a>
                </li>
                </ul>
            </div>
        </div>
    </nav>
        <div class="card mb-3 p-3" id="game" hidden>
    <div class="row g-4 align-items-start">
        <div class="col-md-4">
    <div class="poster-container">
        <img src="#" id="poster">
    </div>
</div>
        <div class="col-md-8">
            <div class="card-body p-0">
                <h5 class="card-title">
                    <i class="fa-solid fa-film"></i>
                    <span id="title"></span>
                </h5>
                <p class="card-text" id="desc"></p>
                <h6>Developers:</h6>
                <div id="developers"></div>
                <h6 class="mt-3">Genres:</h6>
                <div id="genres"></div>
                <p class="card-text mt-3">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    <small class="text-body-secondary" id="date"></small>
                </p>
            </div>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lH B60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const params = new URLSearchParams(location.search)
        const link = params.get('l')

        if (link) {
            const game = document.getElementById('game')
            axios.get(`https://api.rawg.io/api/games/${link}?key=162f8d5be4a6451d815338a76abe5482`)
                .then(rsp => {
                    document.getElementById('title').innerText = rsp.data.name
                    document.getElementById('poster').src = rsp.data.background_image
                    document.getElementById('desc').innerText = rsp.data.description_raw
                    document.getElementById('date').innerText = `Released ${rsp.data.released}`

                    const developers = document.getElementById('developers')
                    for (let d of rsp.data.developers) {
                        const span = document.createElement('span')
                        span.classList = 'badge rounded-pill bg-light text-dark mx-1'
                        span.innerText = d.name
                        developers.appendChild(span)
                    }
                    
                    const genres = document.getElementById('genres')
                    for (let g of rsp.data.genres) {
                        const span = document.createElement('span')
                        span.classList = 'badge rounded-pill bg-secondary text-light mx-1'
                        span.innerText = g.name
                        genres.appendChild(span)
                    }

                    document.title = rsp.data.name
                    game.hidden = false
                })
        }

    </script>
</body>

</html>
