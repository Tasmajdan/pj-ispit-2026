<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-black text-light">
    <div class="container">
        <nav class="navbar navbar-expand-lg mb-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="/index.html">
            <i class="fa-solid fa-gamepad"></i> World of Games
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/index.html">
                        <i class="fa-solid fa-house"></i> Početna
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/customer.html">
                        <i class="fa-solid fa-user"></i> Korisnici
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/library.html">
                        <i class="fa-solid fa-book"></i> Biblioteka
                    </a>
                </li>
                </ul>
            </div>
            <form class="d-flex" role="search">
                    <input id="search" class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                    <button id="search-btn" class="btn custom-search-btn" type="submit">Search</button>
            </form>
        </div>
    </nav>
        <h1 class="h3">What to play?</h1>
        <div id="content"></div>
</div>
    <template id="template">
        <div class="card gamecard d-flex flex-column bg-tertiary-color" style="width: 18rem;">
  <img src="#" class="card-img-top poster">
  <div class="card-body flex-grow-1">
    <h5 class="card-title title"></h5>
    <div class="mb-2">
    <h6 class="font-weight-bold">Genres:</h6>
    <div class="genres small text-secondary"></div>
</div>

<div class="mb-2">
    <h6 class="font-weight-bold">Platforms:</h6>
    <div class="platforms"></div>
</div>
    <p class="card-text metacritic">
    <img src="./img/metacritic.png"
         alt="MetaCritic" style="width:20px;height:20px;border-radius:50%;vertical-align:middle;margin-right:5px;">
    <span class="score">N/A</span>
</p>
    </div>
    <div class="card-footer">
    <a href="#" class="btn btn-sm btn-primary w-100 details">
        <i class="fa-solid fa-arrow-up-right-from-square"></i>Detalji</a>
    </div>
</div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
const content = document.getElementById('content')
const template = document.getElementById('template')

let games = []

function renderGames(list) {
    content.innerHTML = ""

    list.forEach(game => {
        const copy = template.content.cloneNode(true)

        copy.querySelector('.title').innerText = game.name

        copy.querySelector('.genres').innerText =
            game.genres.map(g => g.name).join(', ')

        const platformsDiv = copy.querySelector('.platforms')

    const addedIcons = new Set()

    game.platforms.forEach(p => {
    const name = p.platform.name.toLowerCase()

    let icon = ""
    let style = ""

    if (name.includes("playstation")) {
        icon = "fa-playstation"
        style = "fa-brands"
    } else if (name.includes("xbox")) {
        icon = "fa-xbox"
        style = "fa-brands"
    } else if (name.includes("pc")) {
        icon = "fa-desktop"
        style = "fa-solid"
    } else if (name.includes("nintendo")) {
        icon = "fa-gamepad"
        style = "fa-solid"
    }

    if (icon && !addedIcons.has(icon)) {
        addedIcons.add(icon)

        const i = document.createElement('i')
        i.classList = `${style} ${icon} me-2`
        platformsDiv.appendChild(i)
    }
})

        const score = game.metacritic
        const el = copy.querySelector('.score')

        el.innerText = score || "N/A"

        if (score >= 75) el.style.color = "#00ff00"
        else if (score >= 50) el.style.color = "#ffcc00"
        else if (score) el.style.color = "#ff4d4d"

        copy.querySelector('.details').href = `./game.html?l=${game.slug}`

        const poster = copy.querySelector('.poster')
        poster.src = game.background_image
        poster.alt = game.name

        content.appendChild(copy)
    })
}

    axios.get('https://api.rawg.io/api/games?key=162f8d5be4a6451d815338a76abe5482&platforms=187&page_size=40')
        .then(rsp => {
        games = rsp.data.results
        renderGames(games)
    })

    document.getElementById('search').addEventListener('input', e => {
        const val = e.target.value.toLowerCase()

        const filtered = games.filter(g =>
        g.name.toLowerCase().includes(val)
    )

    renderGames(filtered)
})
</script>
</body>

</html>
