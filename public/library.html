<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-black text-light">
    <div class="container">
        
        <nav class="navbar navbar-expand-lg mb-3">
            <div class="container-fluid">
                <a class="navbar-brand" href="/index.html">
                    <i class="fa-solid fa-gamepad"></i> World of Games
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="/index.html">
                                <i class="fa-solid fa-house"></i> Početna
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/customer.html">
                                <i class="fa-solid fa-user"></i> Korisnici
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/library.html">
                                <i class="fa-solid fa-book"></i> Biblioteka
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <h3>Biblioteka</h3>
        <a href="/new/library.html" class="btn btn-sm btn-primary">+ Dodaj u biblioteku</a>

        <table class="table table-hover table-dark">
            <thead class="table-success">
                <tr>
                    <th scope="col"><i class="fa-solid fa-hashtag"></i></th>
                    <th scope="col">Korisnik</th>
                    <th scope="col">Igra</th>
                    <th scope="col">Status</th>
                    <th scope="col">Ocena</th>
                    <th scope="col">Napomene</th>
                    <th scope="col"><i class="fa-solid fa-clock-rotate-left"></i> Dodato</th>
                    <th scope="col"><i class="fa-solid fa-circle-info"></i> Opcije</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>

    <template id="template">
        <tr>
            <th class="id" scope="row"></th>
            <td class="customer"></td>
            <td class="game-name"></td>
            <td class="status"></td>
            <td class="rating"></td>
            <td class="notes"></td>
            <td class="created"></td>
            <td>
                <div class="btn-group">
                    <a href="#" class="btn btn-sm btn-success edit">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </a>
                    <button type="button" class="btn btn-sm btn-danger remove">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            </td>
        </tr>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const table = document.getElementById('table')
        const template = document.getElementById('template')

        axios.get('/api/library')
            .then(rsp => {
                rsp.data.forEach(lib => {
                    const copy = template.content.cloneNode(true)
                    
                    copy.querySelector('.id').innerText = lib.id ?? ''
                    copy.querySelector('.customer').innerText = `${lib.customer.firstName} ${lib.customer.lastName}`
                    copy.querySelector('.game-name').innerText = lib.gameName ?? ''
                    copy.querySelector('.status').innerText = lib.status
                    copy.querySelector('.rating').innerText = lib.userRating ? lib.userRating + '/10' : '—'
                    copy.querySelector('.notes').innerText = lib.notes || '—'
                    copy.querySelector('.created').innerText = 
                        new Date(lib.createdAt).toLocaleDateString('sr-RS')

                    copy.querySelector('.edit').href = './edit/library.html?id=' + lib.id

                    copy.querySelector('.remove').addEventListener('click', () => {
                        if (!confirm(`Da li sigurno želite da obrišete ${lib.gameName}?`)) return
                        axios.request({
                            url: `/api/library/${lib.id}`,
                            method: 'delete'
                        }).then(() => window.location.reload())
                    })

                    table.appendChild(copy)
                })
            })
    </script>
</body>
</html>
