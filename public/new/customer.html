<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj Korisnika</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-black text-light">
    <div class="container">

        <nav class="navbar navbar-expand-lg mb-3">
            <div class="container-fluid">
                <a class="navbar-brand" href="/index.html">
                    <i class="fa-solid fa-gamepad"></i> World of Games
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/index.html">
                                <i class="fa-solid fa-house"></i> Početna
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/customer.html">
                                <i class="fa-solid fa-user"></i> Korisnici
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/library.html">
                                <i class="fa-solid fa-book"></i> Biblioteka
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
            <div class="mb-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item">
                        <a href="/index.html">Home</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a href="/customer.html">Mušterije</a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page">
                        Dodaj
                    </li>
                </ol>
            </nav>

        <h3>Dodaj Korisnika</h3>

        <form id="new">

            <div class="mb-3">
                <label class="form-label">Ime:</label>
                <input type="text" id="first" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Prezime:</label>
                <input type="text" id="last" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Telefon:</label>
                <input type="text" id="phone" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input type="email" id="email" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">JMBG:</label>
                <input type="text" id="umcn" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">PIB:</label>
                <input type="text" id="tax" class="form-control">
            </div>

            <button type="submit" class="btn btn-success">
                <i class="fa-solid fa-floppy-disk"></i> Sačuvaj
            </button>
        </form>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
document.getElementById('new').addEventListener('submit', (e) => {
    e.preventDefault()

    const tax = document.getElementById('tax').value

    axios.request({
        url: '/api/customer',
        method: 'post',
        data: {
            firstName: document.getElementById('first').value,
            lastName: document.getElementById('last').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            umcn: document.getElementById('umcn').value,
            taxId: tax == '' ? null : tax
        }
    }).then(() => {
        window.location.href = '/customer.html'
    }).catch(err => {
        console.error(err)
        alert('Greška prilikom čuvanja')
    })
})
</script>
</body>
</html>
